<h2>Hero v6.1 — back up, shadow kept</h2>
<p class="subtitle">Logo + tagline restored to top: 18%. Tagline shadow preserved.</p>

<style>
  .hero-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 55% 35% at 50% 70%, rgba(255, 43, 214, 0.35) 0%, transparent 65%),
      linear-gradient(180deg, #07051a 0%, #14093a 40%, #2c0d4d 65%, #4a1668 85%, #6b1a7a 100%);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    isolation: isolate;
  }

  .stars { position: absolute; inset: 0 0 55% 0; overflow: hidden; }
  .stars i {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 4px #fff;
    opacity: 0.85;
    animation: tw 3s ease-in-out infinite;
  }
  .stars i:nth-child(odd) { animation-duration: 4.2s; }
  .stars i:nth-child(3n) { width: 1px; height: 1px; opacity: 0.6; }
  .stars i:nth-child(7n) { width: 3px; height: 3px; box-shadow: 0 0 8px #fff, 0 0 14px #b8e6ff; }
  @keyframes tw { 0%,100%{opacity: 0.3;} 50%{opacity: 1;} }

  .sun {
    position: absolute;
    left: 50%;
    top: 46%;
    transform: translate(-50%, -50%);
    width: 36%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: linear-gradient(180deg, #fff7c2 0%, #ffd166 25%, #ff8a3d 55%, #ff2bd6 100%);
    box-shadow:
      0 0 60px #ff2bd6,
      0 0 120px #ff2bd6,
      0 0 200px rgba(255, 43, 214, 0.5);
    z-index: 1;
  }
  .sun::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent calc(50% + 0px),
      #1a0535 calc(50% + 0px),
      #1a0535 calc(50% + 4px),
      transparent calc(50% + 4px),
      transparent calc(50% + 14px),
      #1a0535 calc(50% + 14px),
      #1a0535 calc(50% + 19px),
      transparent calc(50% + 19px),
      transparent calc(50% + 32px),
      #1a0535 calc(50% + 32px),
      #1a0535 calc(50% + 38px),
      transparent calc(50% + 38px),
      transparent calc(50% + 54px),
      #1a0535 calc(50% + 54px),
      #1a0535 calc(50% + 61px)
    );
    mix-blend-mode: multiply;
  }

  .horizon {
    position: absolute;
    left: 0; right: 0;
    top: 64%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ff2bd6 20%, #fff 50%, #ff2bd6 80%, transparent);
    box-shadow: 0 0 24px #ff2bd6, 0 0 60px #ff2bd6;
    z-index: 3;
  }

  .grid-floor {
    position: absolute;
    left: -10%; right: -10%;
    top: 64%;
    bottom: 0;
    perspective: 360px;
    perspective-origin: 50% 0%;
    z-index: 2;
  }
  .grid-floor::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right,  #ff2bd6 0, #ff2bd6 1px, transparent 1px, transparent 40px),
      linear-gradient(to bottom, #ff2bd6 0, #ff2bd6 1px, transparent 1px, transparent 32px);
    background-size: 40px 32px, 40px 32px;
    transform: rotateX(62deg);
    transform-origin: 50% 0%;
    box-shadow: 0 0 30px #ff2bd6;
    filter: drop-shadow(0 0 6px #ff2bd6);
  }
  .grid-floor::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #14093a 0%, transparent 25%, transparent 75%, #07051a 100%);
    pointer-events: none;
  }

  .mountains {
    position: absolute;
    left: 0; right: 0;
    width: 100%;
    top: calc(64% - 70px);
    height: 72px;
    z-index: 2;
    display: block;
  }

  .palm {
    position: absolute;
    bottom: 0;
    width: 16%;
    height: 82%;
    z-index: 4;
    pointer-events: none;
  }
  .palm.left  { left: -1%; }
  .palm.right { right: -1%; transform: scaleX(-1); }

  .hero-text {
    position: absolute;
    left: 0; right: 0;
    top: 18%;
    text-align: center;
    z-index: 5;
  }
  .hero-text .logo {
    font-size: clamp(80px, 14vw, 200px);
    font-weight: 900;
    letter-spacing: -6px;
    line-height: 1;
    margin: 0;
    color: #fff;
    text-shadow:
      0 0 8px #fff,
      0 0 18px #ff2bd6,
      0 0 36px #ff2bd6,
      0 0 60px #b026ff,
      0 4px 0 #1a0535;
  }
  /* Tagline: dark backing shadow first (for legibility against the magenta sky),
     then the cyan neon glow on top. */
  .hero-text .tag {
    margin: 14px 0 0;
    font-size: clamp(12px, 1.2vw, 16px);
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #22d3ee;
    text-shadow:
      0 2px 6px rgba(0, 0, 0, 0.85),
      0 1px 1px rgba(0, 0, 0, 0.95),
      0 0 10px rgba(0, 0, 0, 0.7),
      0 0 8px #22d3ee,
      0 0 18px #00b4d8;
  }

  .hero-cta {
    position: absolute;
    left: 0; right: 0;
    bottom: 6%;
    text-align: center;
    z-index: 6;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .hero-cta .install {
    display: inline-block;
    padding: 10px 18px;
    border: 1px solid #22d3ee;
    border-radius: 6px;
    color: #e6fbff;
    background: rgba(7, 5, 26, 0.55);
    backdrop-filter: blur(2px);
    box-shadow: 0 0 18px rgba(34, 211, 238, 0.5);
    font-size: 14px;
  }
  .hero-cta .install .prompt { color: #ff2bd6; margin-right: 8px; }
</style>
